    <!-- === ТЕГИ ДЛЯ МОБИЛЬНЫХ === -->
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<body>

    <div class="main-wrapper">
        <header class="header">
            <div class="logo">⚛️ Физика 7 Класс</div>
            <p class="subtitle">Решай задачи и становись лучше!</p>
        </header>

        <div class="container">
            <!-- Блок ввода ника -->
            <div class="user-section">
                <label for="nick">Представьтесь:</label>
                <div class="input-group">
                    <input type="text" id="nick" class="input-nick" placeholder="Ваш никнейм">
                </div>
            </div>

            <!-- Область задачи -->
            <div class="task-card">
                <div class="task-header">
                    <span class="badge">Задача №<span id="taskNumber">1</span></span>
                </div>
                <div class="task-content">
                    <p id="taskText" class="task-text">Загрузка...</p>
                </div>
                
                <div class="answer-section">
                    <input type="number" id="userAnswer" class="input-answer" placeholder="Введите числовой ответ">
                    <div class="controls">
                        <button onclick="checkAnswer()" class="btn btn-check">Проверить</button>
                        <button onclick="resetTask()" class="btn btn-next">Следующая</button>
                    </div>
                    <div id="result" class="result-message"></div>
                </div>
            </div>

            <!-- Таблица лидеров -->
            <div class="leaderboard">
                <h3>🏆 Доска почета</h3>
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Ник</th>
                            <th>Решено задач верно</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Сюда вставляются строки через JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer>
            <p>Удачи в учебе!</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
